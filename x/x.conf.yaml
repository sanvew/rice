- defaults:
    link:
      create: true
      relink: true
      backup: true
- link:
    ~/.xinitrc: './xinitrc'
    ~/.xprofile: './xprofile'
    ~/.Xresources: './Xresources'
    ~/.config/X11/xinitrc.d:
      glob: true
      path: './xinitrc.d/**'
    ~/.config/mimeapps.list: './mimeapps.list'

