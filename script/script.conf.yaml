- defaults:
    link:
      create: true
      relink: true
      backup: true
# keep every config in separate section so nothing get overwritten
- link:
    ~/.local/bin:
      glob: true
      path: './*'
      exclude: [ './script.conf.yaml', './statusbar', './reload', './dmenu' ]
- link:
    ~/.local/bin/statusbar:
      glob: true
      prefix: "sb-"
      path: './statusbar/*'
- link:
    ~/.local/bin:
      glob: true
      prefix: "reload-"
      path: './reload/*'
- link:
    ~/.local/bin:
      glob: true
      prefix: "dmenu-"
      path: './dmenu/*'

